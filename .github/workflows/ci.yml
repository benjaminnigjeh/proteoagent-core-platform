name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install flake8 && pip install -r agents/requirements.txt

      - name: Flake8
        run: flake8 agents/

  build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agents image
        uses: docker/build-push-action@v6
        with:
          context: ./agents
          push: false
          tags: proteoagent-agents:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: false
          tags: proteoagent-nginx:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  health-check:
    name: Compose health check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start stack (no Ollama pull)
        env:
          ANTHROPIC_API_KEY: dummy
        run: |
          docker compose up -d --build nginx agents
          echo "Waiting for agents health…"
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q agents) 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 4
          done
          curl --fail http://localhost/api/health

      - name: Tear down
        if: always()
        run: docker compose down -v
