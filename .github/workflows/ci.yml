name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r agents/requirements-dev.txt

      - name: Flake8 — agents
        run: flake8 agents/

      - name: Flake8 — mcp
        run: flake8 mcp/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-omit="tests/*" \
            -p no:warnings

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: agents/coverage.xml

  build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agents image
        uses: docker/build-push-action@v6
        with:
          context: ./agents
          push: false
          tags: proteoagent-agents:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: false
          tags: proteoagent-nginx:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build mcp image
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: false
          tags: proteoagent-mcp:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  health-check:
    name: Compose health check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start stack (no Ollama pull)
        env:
          ANTHROPIC_API_KEY: dummy
        run: |
          docker compose up -d --build nginx agents mcp
          echo "Waiting for agents health…"
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q agents) 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 4
          done
          curl --fail http://localhost/api/health
          echo "Waiting for mcp health…"
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q mcp) 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 5
          done
          [ "$STATUS" = "healthy" ] || (echo "mcp did not become healthy" && exit 1)

      - name: Tear down
        if: always()
        run: docker compose down -v
