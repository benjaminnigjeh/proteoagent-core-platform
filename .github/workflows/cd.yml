name: CD — Build & Push

on:
  push:
    branches: [main]
    tags:    ["v*"]

env:
  DOCKERHUB_USERNAME: benjaminnourinigjeh
  AGENTS_IMAGE:       benjaminnourinigjeh/proteoagent-agents
  NGINX_IMAGE:        benjaminnourinigjeh/proteoagent-nginx
  MCP_IMAGE:          benjaminnourinigjeh/proteoagent-mcp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta — agents
        id: meta-agents
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.AGENTS_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker meta — nginx
        id: meta-nginx
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.NGINX_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker meta — mcp
        id: meta-mcp
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.MCP_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push agents
        uses: docker/build-push-action@v6
        with:
          context:   ./agents
          platforms: linux/amd64,linux/arm64
          push:      true
          tags:      ${{ steps.meta-agents.outputs.tags }}
          labels:    ${{ steps.meta-agents.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push nginx
        uses: docker/build-push-action@v6
        with:
          context:   ./nginx
          platforms: linux/amd64,linux/arm64
          push:      true
          tags:      ${{ steps.meta-nginx.outputs.tags }}
          labels:    ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push mcp
        uses: docker/build-push-action@v6
        with:
          context:   ./mcp
          platforms: linux/amd64,linux/arm64
          push:      true
          tags:      ${{ steps.meta-mcp.outputs.tags }}
          labels:    ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Optional: notify on failure ───────────────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: push
    if: failure()
    steps:
      - name: Summarise failure
        run: |
          echo "::error::CD pipeline failed on branch ${{ github.ref_name }} (commit ${{ github.sha }})"
          echo "Check the push job logs for details."
