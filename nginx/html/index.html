<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProteoAgent Core Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --warn:      #d29922;
      --danger:    #f85149;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --radius:    8px;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .logo { display: flex; align-items: center; gap: .75rem; font-weight: 700; font-size: 1.1rem; }
    .logo svg { width: 28px; height: 28px; }
    .badge {
      font-size: .65rem; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; background: var(--accent); color: var(--bg);
      text-transform: uppercase; letter-spacing: .05em;
    }
    #health-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--muted); transition: background .3s;
    }
    #health-dot.ok    { background: var(--accent2); }
    #health-dot.error { background: var(--danger);  }

    /* ── Layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-section { padding: 1rem; border-bottom: 1px solid var(--border); }
    .sidebar-section h3 { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .75rem; }

    label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .3rem; margin-top: .75rem; }
    label:first-child { margin-top: 0; }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .875rem;
      padding: .5rem .75rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; font-family: var(--font-mono); }

    #prompt-input { min-height: 120px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .55rem 1.25rem; border-radius: var(--radius);
      font-size: .875rem; font-weight: 600; border: none; cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover  { opacity: .85; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: var(--bg); width: 100%; margin-top: .75rem; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    #sessions-list { flex: 1; overflow-y: auto; padding: .5rem; }
    .session-item {
      padding: .5rem .75rem; border-radius: var(--radius); cursor: pointer;
      font-size: .8rem; font-family: var(--font-mono); color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .15s;
    }
    .session-item:hover    { background: var(--border); }
    .session-item.active   { background: rgba(88,166,255,.15); color: var(--accent); }

    /* ── Chat panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 820px;
      width: 100%;
      align-self: flex-start;
    }
    .msg.user { align-self: flex-end; }

    .msg-bubble {
      padding: .75rem 1rem;
      border-radius: var(--radius);
      font-size: .875rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble   { background: rgba(88,166,255,.15); border: 1px solid rgba(88,166,255,.3); }
    .msg.agent .msg-bubble  { background: var(--surface);       border: 1px solid var(--border); }
    .msg.system .msg-bubble { background: rgba(63,185,80,.08);  border: 1px solid rgba(63,185,80,.25); color: var(--accent2); font-family: var(--font-mono); font-size: .8rem; }
    .msg.error .msg-bubble  { background: rgba(248,81,73,.08);  border: 1px solid rgba(248,81,73,.3);  color: var(--danger); }

    .msg-label { font-size: .7rem; color: var(--muted); margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .06em; }
    .msg.user .msg-label { text-align: right; }

    /* Routing decision card */
    .routing-card { font-family: var(--font-mono); font-size: .78rem; }
    .routing-agents { display: flex; flex-wrap: wrap; gap: .4rem; margin: .5rem 0; }
    .agent-chip {
      padding: 2px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600;
      background: rgba(88,166,255,.15); border: 1px solid rgba(88,166,255,.3); color: var(--accent);
    }
    .agent-chip.parallel { background: rgba(210,153,34,.1); border-color: rgba(210,153,34,.3); color: var(--warn); }
    .routing-field { margin-top: .4rem; }
    .routing-field span { color: var(--muted); }

    /* QC badge */
    .qc-row { display: flex; align-items: center; gap: .5rem; margin-top: .6rem; flex-wrap: wrap; }
    .qc-pass { color: var(--accent2); font-size: .78rem; }
    .qc-warn { color: var(--warn);    font-size: .78rem; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .spinner.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .75rem; color: var(--muted); text-align: center;
    }
    .empty-state svg { width: 48px; height: 48px; opacity: .3; }
    .empty-state p { font-size: .9rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="13" stroke="#58a6ff" stroke-width="1.5"/>
      <path d="M8 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="14" cy="18" r="2.5" fill="#58a6ff"/>
      <path d="M11 18h-3M17 18h3" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    ProteoAgent Core Platform
    <span class="badge">v1</span>
  </div>
  <div style="display:flex;align-items:center;gap:.6rem;font-size:.8rem;color:var(--muted)">
    <div id="health-dot"></div>
    <span id="health-label">checking…</span>
  </div>
</header>

<main>
  <!-- ── Sidebar ── -->
  <aside>
    <div class="sidebar-section">
      <h3>Configuration</h3>

      <label for="llm-select">LLM backend</label>
      <select id="llm-select">
        <option value="ollama">Ollama (local)</option>
        <option value="claude">Claude (Anthropic)</option>
      </select>

      <div id="api-key-row" style="display:none">
        <label for="api-key-input">Anthropic API key</label>
        <input id="api-key-input" type="password" placeholder="sk-ant-…" autocomplete="off" />
      </div>

      <label for="prompt-input">User prompt</label>
      <textarea id="prompt-input" placeholder="Describe your proteomics task…&#10;e.g. Deconvolve the attached m/z CSV and run proteoform identification."></textarea>

      <button id="run-btn" class="btn btn-primary">
        <span id="run-spinner" class="spinner"></span>
        Submit
      </button>
    </div>

    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;border-bottom:none;">
      <h3 style="flex-shrink:0">Sessions</h3>
      <div id="sessions-list"></div>
      <div style="padding:.5rem;flex-shrink:0">
        <button id="new-session-btn" class="btn btn-secondary" style="width:100%;font-size:.8rem">+ New session</button>
      </div>
    </div>
  </aside>

  <!-- ── Chat panel ── -->
  <div class="chat-panel">
    <div id="chat-log">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="8" width="40" height="32" rx="4" stroke="currentColor" stroke-width="2"/>
          <path d="M16 20h16M16 28h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>Enter a prompt and click Submit to start a session.</p>
      </div>
    </div>
  </div>
</main>

<script>
  /* ── State ──────────────────────────────────────────────────────────────── */
  let currentSessionId = null;
  const sessions = {}; // id → [{role, content}]

  /* ── DOM refs ───────────────────────────────────────────────────────────── */
  const chatLog       = document.getElementById('chat-log');
  const promptInput   = document.getElementById('prompt-input');
  const runBtn        = document.getElementById('run-btn');
  const runSpinner    = document.getElementById('run-spinner');
  const sessionsList  = document.getElementById('sessions-list');
  const llmSelect     = document.getElementById('llm-select');
  const apiKeyRow     = document.getElementById('api-key-row');
  const apiKeyInput   = document.getElementById('api-key-input');
  const healthDot     = document.getElementById('health-dot');
  const healthLabel   = document.getElementById('health-label');
  const emptyState    = document.getElementById('empty-state');

  /* ── Health check ───────────────────────────────────────────────────────── */
  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      if (r.ok) {
        healthDot.className = 'ok';
        healthLabel.textContent = 'API online';
      } else throw new Error();
    } catch {
      healthDot.className = 'error';
      healthLabel.textContent = 'API offline';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30_000);

  /* ── LLM selector ───────────────────────────────────────────────────────── */
  llmSelect.addEventListener('change', () => {
    apiKeyRow.style.display = llmSelect.value === 'claude' ? 'block' : 'none';
  });

  /* ── Session management ──────────────────────────────────────────────────── */
  function createSession() {
    const id = crypto.randomUUID();
    sessions[id] = [];
    currentSessionId = id;
    renderSessionList();
    renderChat([]);
    return id;
  }

  function renderSessionList() {
    sessionsList.innerHTML = '';
    Object.keys(sessions).reverse().forEach(id => {
      const el = document.createElement('div');
      el.className = 'session-item' + (id === currentSessionId ? ' active' : '');
      el.textContent = id.slice(0, 8) + '…';
      el.title = id;
      el.addEventListener('click', () => {
        currentSessionId = id;
        renderSessionList();
        renderChat(sessions[id]);
      });
      sessionsList.appendChild(el);
    });
  }

  /* ── Chat rendering ──────────────────────────────────────────────────────── */
  function renderChat(msgs) {
    chatLog.innerHTML = '';
    if (msgs.length === 0) {
      chatLog.appendChild(emptyState);
      return;
    }
    msgs.forEach(m => appendMsg(m.role, m.content));
  }

  function appendMsg(role, content) {
    if (emptyState.parentNode === chatLog) chatLog.removeChild(emptyState);

    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : role === 'agent' ? 'Supervisor Agent' : role === 'system' ? 'System' : 'Error';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'agent' && typeof content === 'object') {
      bubble.appendChild(buildRoutingCard(content));
    } else {
      bubble.textContent = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
    }

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chatLog.appendChild(wrapper);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function buildRoutingCard({ decision, qc }) {
    const card = document.createElement('div');
    card.className = 'routing-card';

    // Agents needed
    const agentsRow = document.createElement('div');
    agentsRow.className = 'routing-agents';
    (decision.agents_needed || []).forEach(a => {
      const chip = document.createElement('span');
      chip.className = 'agent-chip' + (decision.run_parallel ? ' parallel' : '');
      chip.textContent = a;
      agentsRow.appendChild(chip);
    });
    card.appendChild(agentsRow);

    // Reasoning
    if (decision.reasoning) {
      const r = document.createElement('div');
      r.className = 'routing-field';
      r.innerHTML = `<span>Reasoning: </span>${escHtml(decision.reasoning)}`;
      card.appendChild(r);
    }

    // Next step
    if (decision.next_step) {
      const ns = document.createElement('div');
      ns.className = 'routing-field';
      ns.innerHTML = `<span>Next step: </span>${escHtml(decision.next_step)}`;
      card.appendChild(ns);
    }

    // QC
    const qcRow = document.createElement('div');
    qcRow.className = 'qc-row';
    if (qc.passed) {
      qcRow.innerHTML = `<span class="qc-pass">✔ QC passed</span>`;
    } else {
      qcRow.innerHTML = `<span class="qc-warn">⚠ QC: ${escHtml((qc.warnings || []).join(' · '))}</span>`;
    }
    card.appendChild(qcRow);

    return card;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Submit ──────────────────────────────────────────────────────────────── */
  runBtn.addEventListener('click', submitPrompt);
  promptInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitPrompt();
  });

  async function submitPrompt() {
    const text = promptInput.value.trim();
    if (!text) return;

    if (!currentSessionId) createSession();

    const sid = currentSessionId;
    runBtn.disabled = true;
    runSpinner.classList.add('visible');
    promptInput.value = '';

    const userMsg = { role: 'user', content: text };
    sessions[sid].push(userMsg);
    appendMsg('user', text);

    try {
      const body = {
        session_id:        sid,
        user_input:        text,
        llm_choice:        llmSelect.value,
        anthropic_api_key: llmSelect.value === 'claude' ? apiKeyInput.value || null : null,
      };

      const res = await fetch('/api/run', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });

      const data = await res.json();

      if (!res.ok) {
        const errMsg = { role: 'error', content: data.detail || 'Unknown error' };
        sessions[sid].push(errMsg);
        appendMsg('error', errMsg.content);
      } else {
        const agentMsg = { role: 'agent', content: { decision: data.decision, qc: data.qc } };
        sessions[sid].push(agentMsg);
        appendMsg('agent', agentMsg.content);
      }
    } catch (err) {
      appendMsg('error', 'Network error: ' + err.message);
    } finally {
      runBtn.disabled = false;
      runSpinner.classList.remove('visible');
    }
  }

  /* ── New session button ──────────────────────────────────────────────────── */
  document.getElementById('new-session-btn').addEventListener('click', () => {
    createSession();
    promptInput.focus();
  });

  /* ── Auto-create first session ───────────────────────────────────────────── */
  createSession();
</script>
</body>
</html>
